name: sac_sb3
# Maps onto stable_baselines3.SAC(...) constructor kwargs (see sac_kwargs()
# in train_sac_fable5.py) plus that script's own loop-level settings.
total_timesteps: 500_000
buffer_size: 100_000
learning_starts: 5000
batch_size: 256
learning_rate: 3.0e-4
gamma: 0.99
tau: 0.005
train_freq: 1
gradient_steps: 1
target_update_interval: 1
ent_coef: auto
net_arch: [256, 256]
eval_frequency: 10_000
n_episodes_test: 5
