defaults:
  - env: dmc_cheetah_pixels
  - algo: sac_sb3_fable5
  - embedding: resnet50_fable5
  - _self_

mode: pvr                # state | pixels | pvr
seed: 1
device: cuda              # set to cpu if no GPU
freeze_encoder: true      # true -> encode once per env step (fast, PVREncoderWrapper);
                           # false -> finetune in policy (PVRFeaturesExtractor)

save:
  enabled: true
  checkpoint_frequency: 20_000

wandb:
  enabled: false
  project: pvr_torch
  entity: majoinen-karri
  run_name: null           # auto-generated if null

perf:
  tf32: true
  cudnn_benchmark: true
  amp_bf16: true            # bf16 autocast for frozen-encoder inference
  compile_encoder: false    # torch.compile the frozen encoder (try once stable)

hydra:
  job:
    chdir: true
  run:
    dir: outputs/sac_fable5_sb3/${env.name}/${embedding.name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: outputs/sac_fable5_sb3_multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}_${embedding.name}_seed${seed}
